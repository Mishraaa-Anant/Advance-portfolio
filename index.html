<body>

      <div style="display:flex; align-items:center; gap:12px;">
        <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">

    <!-- CHAT AREA -->

          <button class="suggestion-chip" data-query="Tell me about yourself">Tell me about yourself</button>
          <button class="suggestion-chip" data-query="Show me your projects">Show projects</button>
          <button class="suggestion-chip" data-query="What are your skills and tech stack?">What are your skills?</button>
          <button class="suggestion-chip" data-query="How can I contact you?">Contact details</button>
        </div>
      </div>

      <!-- MESSAGES -->
      <div class="messages" id="chatMessages"></div>
    </div>

    <!-- INPUT BAR -->
    <div class="input-wrapper">
      <div class="input-bar" id="inputBar">
        <input
          type="text"
          class="chat-input"
          id="chatInput"
          placeholder="Ask me anything about Anant…"
          aria-label="Chat input"
          autocomplete="off"
          maxlength="500"
        />
        <button class="send-btn" id="sendBtn" aria-label="Send" disabled>

        </button>
      </div>
      <div class="input-footer">Anant's AI can make mistakes. Verify important info.</div>

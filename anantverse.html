<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AnantVerse — A new dimension is loading. Something big is being built by Anant Mishra." />
  <meta name="author" content="Anant Mishra" />
  
  <!-- Canonical & Meta -->
  <link rel="canonical" href="https://myselfanantmishra.vercel.app/anantverse.html" />
  <title>AnantVerse | Coming Soon</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://myselfanantmishra.vercel.app/anantverse.html" />
  <meta property="og:title" content="AnantVerse | Coming Soon" />
  <meta property="og:description" content="A new dimension is loading... Stay tuned for AnantVerse." />
  <meta property="og:image" content="https://myselfanantmishra.vercel.app/profile.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       CORE DESIGN SYSTEM
       ═══════════════════════════════════════════ */
    :root {
      --bg: #050508;
      --bg-gradient: radial-gradient(circle at 50% 50%, #0c0a1a 0%, #050508 100%);
      --surface: rgba(13, 11, 26, 0.55);
      --border: rgba(0, 242, 254, 0.18);
      --accent-cyan: #00f2fe;
      --accent-purple: #7f00ff;
      --text: #f0f0f5;
      --text-muted: #8d92b5;
      --glow-cyan: 0 0 30px rgba(0, 242, 254, 0.2);
      --font-main: 'Outfit', sans-serif;
      --font-code: 'Fira Code', monospace;
      --radius: 24px;
      --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      background-image: var(--bg-gradient);
      color: var(--text);
      font-family: var(--font-main);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Cosmic Background Canvas */
    #constellationCanvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.85;
    }

    /* ═══════════════════════════════════════════
       COMING SOON CARD
       ═══════════════════════════════════════════ */
    .coming-soon-card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--glow-cyan), 0 24px 64px rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      max-width: 480px;
      width: 90%;
      padding: 50px 40px;
      text-align: center;
      overflow: hidden;
      transition: var(--transition);
      animation: cardFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .coming-soon-card:hover {
      border-color: rgba(0, 242, 254, 0.4);
      box-shadow: 0 0 40px rgba(0, 242, 254, 0.25), 0 24px 64px rgba(0, 0, 0, 0.7);
    }

    .coming-soon-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-purple), transparent);
      opacity: 0.8;
    }

    /* Hologram Rings */
    .bg-rings {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .ring {
      position: absolute;
      border: 1px solid rgba(0, 242, 254, 0.08);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: ringPulse 4s ease-in-out infinite;
    }

    .ring-1 { width: 260px; height: 260px; animation-delay: 0s; }
    .ring-2 { width: 380px; height: 380px; animation-delay: 1s; }
    .ring-3 { width: 500px; height: 500px; animation-delay: 2s; }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); border-color: rgba(127, 0, 255, 0.15); }
    }

    .card-content {
      position: relative;
      z-index: 5;
    }

    /* Portal Icon */
    .icon-wrap {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: rgba(0, 242, 254, 0.06);
      border: 1px solid rgba(0, 242, 254, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: floatIcon 4s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); border-color: var(--accent-cyan); box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); }
    }

    .icon-wrap svg {
      stroke: var(--accent-cyan);
      filter: drop-shadow(0 0 4px var(--accent-cyan));
    }

    /* Brand Header */
    .title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 6px;
    }

    .title span {
      background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
    }

    .tagline {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Launch Status Indicator */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 242, 254, 0.08);
      border: 1px solid rgba(0, 242, 254, 0.2);
      border-radius: 99px;
      padding: 10px 22px;
      margin-bottom: 24px;
    }

    .rocket {
      font-size: 20px;
      display: inline-block;
      animation: rocketThrust 1.5s ease-in-out infinite;
    }

    @keyframes rocketThrust {
      0%, 100% { transform: translateY(0) rotate(-45deg); }
      50% { transform: translateY(-4px) rotate(-45deg); }
    }

    .status-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent-cyan);
      letter-spacing: 0.5px;
    }

    .desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 32px;
    }

    /* Cyber Loading bar */
    .loader-container {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      height: 6px;
      border-radius: 99px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 99px;
      animation: fillBar 4s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
      box-shadow: 0 0 10px var(--accent-cyan);
    }

    @keyframes fillBar {
      to { width: 72%; } /* Holds at 72% for construction theme */
    }

    .telemetry-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-code);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 36px;
      padding: 0 4px;
    }

    .telemetry-percent {
      color: var(--accent-cyan);
      font-weight: 600;
    }

    /* Gateway button */
    .portal-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 28px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #fff;
      background: linear-gradient(135deg, rgba(0, 242, 254, 0.12) 0%, rgba(127, 0, 255, 0.12) 100%);
      border: 1px solid rgba(0, 242, 254, 0.25);
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
    }

    .portal-btn:hover {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.2);
      transform: translateY(-2px);
    }

    .portal-btn svg {
      transition: transform 0.3s ease;
    }

    .portal-btn:hover svg {
      transform: translateX(-4px);
    }

    /* Animations */
    @keyframes cardFadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .coming-soon-card {
        padding: 40px 24px 36px;
      }
      .title {
        font-size: 26px;
      }
      .status-text {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <!-- Dynamic Starfield Particle Canvas -->
  <canvas id="constellationCanvas"></canvas>

  <!-- Centered Futuristic Coming Soon Panel -->
  <div class="coming-soon-card">
    <div class="bg-rings">
      <span class="ring ring-1"></span>
      <span class="ring ring-2"></span>
      <span class="ring ring-3"></span>
    </div>
    
    <div class="card-content">
      <!-- Rotating Cyber Logo -->
      <div class="icon-wrap">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
        </svg>
      </div>

      <h1 class="title">Anant<span>Verse</span></h1>
      <p class="tagline">A New Dimension is Loading</p>

      <!-- Pulse Status Badge -->
      <div class="status-badge">
        <span class="rocket">🚀</span>
        <span class="status-text">Coming Soon</span>
      </div>

      <p class="desc">Something big is being built. Stay tuned for a completely new, immersive cybernetic experience.</p>

      <!-- Active Cyber progress bar -->
      <div class="loader-container">
        <div class="loader-bar"></div>
      </div>

      <div class="telemetry-row">
        <span>GRID_SCANNER: <span class="telemetry-percent">ACTIVE</span></span>
        <span id="loadText">BUILDING... 72%</span>
      </div>

      <!-- Secure Gateway button back to portfolio -->
      <a href="index.html" class="portal-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Portfolio
      </a>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       BACKGROUND CANVAS NODE CONSTELLATION
       ═══════════════════════════════════════════ */
    const canvas = document.getElementById('constellationCanvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    let particles = [];
    const particleCount = Math.min(80, Math.floor((width * height) / 18000));
    let mouse = { x: null, y: null, radius: 150 };

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.radius = Math.random() * 2 + 1;
        this.color = Math.random() > 0.5 ? 'rgba(0, 242, 254, 0.4)' : 'rgba(127, 0, 255, 0.4)';
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        // Bounce boundaries
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;

        // Mouse attraction
        if (mouse.x && mouse.y) {
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (dist < mouse.radius) {
            const force = (mouse.radius - dist) / mouse.radius;
            this.x -= dx * force * 0.02;
            this.y -= dy * force * 0.02;
          }
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = this.radius * 2;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0; // Reset
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, width, height);

      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();

        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.hypot(dx, dy);

          if (dist < 100) {
            const alpha = (100 - dist) / 100 * 0.15;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0, 242, 254, ${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      initParticles();
    });

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('mouseleave', () => {
      mouse.x = null;
      mouse.y = null;
    });

    initParticles();
    animateParticles();

    /* ═══════════════════════════════════════════
       TELEMETRY PERCENT LOADER
       ═══════════════════════════════════════════ */
    let percent = 0;
    const loadText = document.getElementById('loadText');
    const interval = setInterval(() => {
      if (percent < 72) {
        percent++;
        loadText.textContent = `BUILDING... ${percent}%`;
      } else {
        clearInterval(interval);
      }
    }, 45);
  </script>
</body>
</html>
